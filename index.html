<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>3D Love Hafshah Aulia</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    perspective: 1000px;
    font-family: Arial, sans-serif;
}

.container {
    position: absolute;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
}

/* ✨ TEXT GLOW */
.text {
    position: absolute;
    color: #fff;
    font-weight: bold;
    white-space: nowrap;
    text-shadow:
        0 0 5px #fff,
        0 0 10px #fff,
        0 0 20px #ff9bd3,
        0 0 30px #ff4da6;
}

/* ❤️ HEART */
.heart {
    color: red;
    text-shadow:
        0 0 5px red,
        0 0 10px red,
        0 0 20px red;
}

/* 📸 FOTO */
.photo {
    position: absolute;
    width: 90px;
    height: 110px;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(255,255,255,0.8);
}

/* 🔥 ANIMASI 3D */
@keyframes move3d {
    0% {
        transform: translate3d(0, -100vh, -800px) scale(0.5);
        opacity: 0;
    }
    20% {
        opacity: 1;
    }
    100% {
        transform: translate3d(0, 100vh, 300px) scale(1.3);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="container" id="container"></div>

<script>
const container = document.getElementById("container");
const fotoURL = "IMG_20260425_192818.jpg"; // foto kamu

function createItem() {
    const wrap = document.createElement("div");
    wrap.style.position = "absolute";
    wrap.style.left = Math.random() * 100 + "vw";
    wrap.style.top = "0";
    wrap.style.transformStyle = "preserve-3d";
    wrap.style.animation = "move3d " + (6 + Math.random()*6) + "s linear infinite";

    // TEXT
    const text = document.createElement("div");
    text.className = "text";
    text.style.fontSize = (15 + Math.random()*25) + "px";
    text.innerHTML = "Hafshah Aulia <span class='heart'>❤</span>";

    // FOTO
    const img = document.createElement("img");
    img.src = fotoURL;
    img.className = "photo";
    img.style.top = "30px";

    // RANDOM DEPTH
    const z = Math.random() * -800;
    wrap.style.transform = "translateZ(" + z + "px)";

    wrap.appendChild(text);
    wrap.appendChild(img);

    container.appendChild(wrap);

    setTimeout(() => {
        wrap.remove();
    }, 12000);
}

setInterval(createItem, 300);
</script>

</body>
</html>
